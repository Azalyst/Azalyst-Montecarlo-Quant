name: FundingPips Signals

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC). Actions cron can run a few min late.
  workflow_dispatch:          # allow manual runs from the Actions tab
    inputs:
      test_discord:
        description: "Send a Discord connectivity test only"
        type: boolean
        default: false

permissions:
  contents: write             # needed to commit state back to the repo

concurrency:
  group: signals
  cancel-in-progress: false   # never run two ticks at once

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run signal engine
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.test_discord }}" = "true" ]; then
            python run.py --test-discord
          else
            python run.py
          fi

      - name: Commit state + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state reports
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "state: paper-trade update [skip ci]"
            git push
          fi
