name: Azalyst Montecarlo

# One Monte-Carlo-validated gold 2-step strategy, paper-traded live.
# Runs twice an hour (gold signals are H1; two ticks catch the bar close with a
# retry). The engine is idempotent — only newly-closed bars are processed, so an
# extra or late tick is harmless.

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:
    inputs:
      test_discord:
        description: "Send a Discord connectivity test only"
        type: boolean
        default: false
      reset:
        description: "Reset the challenge to a fresh Phase 1 account"
        type: boolean
        default: false

permissions:
  contents: write          # commit state + dashboard back to the repo

concurrency:
  group: montecarlo
  cancel-in-progress: false   # never run two ticks at once

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run engine
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.test_discord }}" = "true" ]; then
            python run.py --test-discord
          elif [ "${{ inputs.reset }}" = "true" ]; then
            python run.py --reset
          else
            python run.py
          fi

      - name: Commit state + dashboard
        if: ${{ inputs.test_discord != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes this tick"
          else
            git commit -m "tick: challenge update [skip ci]"
            git push
          fi
