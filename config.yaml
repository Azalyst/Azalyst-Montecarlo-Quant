# Azalyst Montecarlo — single-strategy FundingPips 2-Step engine
# One Monte-Carlo-validated gold momentum strategy, paper-trading ONE $100k
# FundingPips 2-step challenge live on GitHub Actions.
#
# The strategy, instrument and risk numbers here are NOT guesses — they are the
# output of reverse-engineering 301,472 real trader trades and an out-of-sample
# backtest + 2-step Monte-Carlo. See research/MASTER_REPORT.md.

brand:
  name: "Azalyst Montecarlo Quant"
  tagline: "Monte-Carlo-validated gold 2-step quant engine"

# Trading mode:
#   safe       = high pass-rate grind (~87% pass both, but ~7 weeks)
#   aggressive = monster-style FAST pass (~6 trading days / 1-2 weeks when it hits,
#                ~50% per attempt, auto-resets and keeps trying on bust). This is
#                how the real >100%/month leaderboard traders passed in ~2 days.
mode: aggressive

account:
  size: 100000.0
  profit_target_p1_pct: 8.0      # Phase 1: +8%
  profit_target_p2_pct: 5.0      # Phase 2: +5%
  max_daily_loss_pct: 5.0        # hard line
  max_overall_loss_pct: 10.0     # hard line, STATIC (floor fixed at 90k)
  min_trading_days: 3
  daily_reset_utc_hour: 22       # FundingPips day rolls ~22:00 UTC (5pm ET)
  challenge_start: "2026-06-20"

# The single instrument the data actually supports an edge on.
instrument:
  symbol: "XAUUSD"
  source: yfinance
  ticker: "GC=F"                 # gold futures ~= spot; scale-invariant strategy
  interval: "1h"
  lot_units: 100                 # 1 lot = 100 oz -> $1 move = $100/lot
  digits: 2
  min_stop: 2.5                  # floor on stop distance (price units)

# Selected by the stability gate (positive expectancy in BOTH train halves AND
# out-of-sample). thr = breakout proximity in ATR units.
strategy:
  rule: "mom_breakout"
  params: {thr: 0.05}
  atr_period: 14
  atr_stop_mult: 2.0             # initial stop = entry -/+ 2*ATR
  trail_mult: 3.0                # trailing stop width (ATR)
  breakeven_at_r: 1.0            # move stop to BE after +1R
  time_stop_bars: 48             # force-exit after 48 H1 bars (~2 days)
  rr_target_display: 3.0         # informational target shown in alerts

# Phase-aware risk engine. The challenge requires passing BOTH phases, so sizing
# is calibrated for the JOINT objective P(pass P1) x P(pass P2) via a 2-D
# Monte-Carlo (P1 risk x P2 risk). Optimum: 0.75% / 0.50% -> P1 ~92%, P2 ~95%,
# ~87% pass both. Risk is kept small because bust risk compounds over two phases.
risk:
  phase1_risk_pct: 0.75
  phase2_risk_pct: 0.50
  daily_loss_stop_pct: 3.0       # stop trading for the day at -3% (buffer below 5%)
  total_dd_brake_pct: 7.0        # stand down once down 7% (buffer below 10%)
  max_trades_per_day: 4
  lockin_band_pct: 1.5           # half size within 1.5% of the phase target

# AGGRESSIVE / fast-pass band (used when mode: aggressive). Calibrated on the
# fast-pass frontier: ~1.75% risk -> median 7 trading days to pass P1, ~71% of
# passes within 2 weeks, ~55% pass per attempt, ~36% bust. Lets winners run, no
# lock-in, no profit cap. On bust it AUTO-RESETS and starts a fresh attempt
# (the multi-attempt monster model). Daily $5k line is the only governor.
# Verified on the fast-pass frontier (out-of-sample, 4000-path bootstrap):
# scale-in at 1.25% beats flat 1.75% -- same ~7-trading-day speed, but full-pass
# 66% vs 55% and bust 23% vs 36%, by adding a tranche on a winner (house money).
# HONEST haircut: the 66% is a favourable gold-trend figure; realistic ~40% per
# attempt, <=30% in a choppy market. It's a TREND-RIDER -- budget 2-3 attempts.
aggressive:
  phase1_risk_pct: 1.25
  phase2_risk_pct: 0.85
  daily_loss_stop_pct: 4.5       # near the 5% line -- aggressive on the day
  total_dd_brake_pct: 9.5        # near the 10% line
  max_trades_per_day: 3
  lockin_band_pct: 0.0           # NO lock-in -- let it run to target full size
  scale_in: true                 # add a tranche at +1R (the monster mechanic)
  add_at_r: 1.0
  time_stop_bars: 96             # let runners breathe (~4 days)
  auto_reset_on_bust: true       # bust -> log attempt, reset, keep trying
  perpetual: true                # also reset after reaching FUNDED (keep demonstrating)

discord:
  enabled: true
  user_id: "1363959528194052118"
