# Azalyst FundingPips - Order Block (OB) Challenge Signal Engine
# Single strategy, single challenge tracking Phase 1 → Phase 2

account:
  size: 100000.0
  max_daily_loss: 5000.0       # 5%
  max_overall_loss: 10000.0    # 10%
  profit_target_pct: 8.0       # Phase 1: +8% to pass
  phase2_target_pct: 5.0       # Phase 2: +5% to pass
  daily_reset_utc_hour: 22
  challenge_start: "2026-06-11"   # Day 1

risk:
  risk_per_trade_pct: 1.0
  safety_buffer: 0.90
  max_leverage: 30

instruments:
  EURUSD:  {source: yfinance, ticker: "EURUSD=X", asset: fx,     value_per_point: 1.0, lot_units: 100000, pip: 0.0001, digits: 5, min_stop: 0.0010}
  GBPUSD:  {source: yfinance, ticker: "GBPUSD=X", asset: fx,     value_per_point: 1.0, lot_units: 100000, pip: 0.0001, digits: 5, min_stop: 0.0010}
  XAUUSD:  {source: yfinance, ticker: "GC=F",     asset: metal,  value_per_point: 1.0, lot_units: 100,    pip: 0.1,    digits: 2, min_stop: 2.5}
  NAS100:  {source: yfinance, ticker: "NQ=F",     asset: index,  value_per_point: 1.0, lot_units: 1,      pip: 1.0,    digits: 2, min_stop: 25.0}
  SP500:   {source: yfinance, ticker: "ES=F",     asset: index,  value_per_point: 1.0, lot_units: 1,      pip: 1.0,    digits: 2, min_stop: 8.0}
  BTCUSD:  {source: bybit,    ticker: "BTCUSDT",  asset: crypto, value_per_point: 1.0, lot_units: 1,      pip: 1.0,    digits: 2, min_stop: 60.0}
  ETHUSD:  {source: bybit,    ticker: "ETHUSDT",  asset: crypto, value_per_point: 1.0, lot_units: 1,      pip: 0.1,    digits: 2, min_stop: 4.0}

strategies:
  ob:
    enabled: true
    instruments: [EURUSD, GBPUSD, XAUUSD, NAS100, SP500, BTCUSD, ETHUSD]
    interval: "15m"           # entry timeframe
    htf_interval: "4h"        # order block detection timeframe
    rr_ratio: 2.0             # 1:2 risk-reward
    ob_lookback: 20           # bars to scan for order blocks

discord:
  user_id: "1363959528194052118"
